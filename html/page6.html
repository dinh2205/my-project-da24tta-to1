<body>
    <div class="container">
        <div id ="list">   </div>
        <button onclick="add()">thêm</button>
    </div>

    <div class="row">
        <input type="text" placeholder="VD: Nhập Môn">
        <input type="text" placeholder="VD: Nhập STC">
        <input type="number" option value="500" min="1">
        <button type="button">Xóa</button>

   <script>
function add(){
    const myRow = document.createElement("div");
    myRow.setAttribute("class","row");

    const myText = document.createTextNode("Thành công");
    myRow.appendChild(myText);

    document.body.appendChild(myRow);
}
</script>
